# This workflow will build a .NET project
# For more information see: https://docs.github.com/en/actions/automating-builds-and-testing-net

name: Build Suave web server

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - name: Install httperf
      run: sudo apt-get install -y httperf
    - uses: actions/checkout@v5
    - name: Setup .NET
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: |
            6.0.x
            10.0.102
    - name: Build
      run: ./build.sh
    - name: Restore local tools
      run: dotnet tool restore
    - name: Generate API documentation
      run: ./scripts/generate-api-docs.sh
    - name: Upload API docs artifact
      uses: actions/upload-artifact@v4
      with:
        name: suave-api-reference
        path: website/content/reference
        if-no-files-found: error
